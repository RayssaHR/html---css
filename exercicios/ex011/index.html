<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Midia</title>
</head>
<body>
    <h1>Imagens dinamicas</h1>
    <picture>
        <source media="(max-width: 350px)" srcset="imagens/pequenacrop.png" type="image/png">
        <source media="(max-width: 750px)" srcset="imagens/pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/media.png" type="image/png">
        <img src="imagens/grande.png" alt="imagem flexível">
    </picture>

    <h1>Reproduzir audio cozy</h1>
        <!--<audio src="midia/Cocktail Lounge - Dyalla.mp3" controls autoplay></audio>--> 
        <!--MP3 WAV OGG-->
      <audio preload="metadata" autoplay controls loop >
        <source src="midia/Cocktail Lounge - Dyalla.mp3" type="audio/mpeg">
        <source src="midia/Cocktail Lounge - Dyalla.mp3" type="audio/ogg">
        <source src="midia/Cocktail Lounge - Dyalla.mp3" type="audio/wav"> <!--nao recomendado por ser muito pesado-->
        <p>Infelizmento seu navegador não reproduz audio. <a href="midia/Cocktail Lounge - Dyalla.mp3">download</a> para acessar o audio</p>
      </audio>
</body>
</html>
