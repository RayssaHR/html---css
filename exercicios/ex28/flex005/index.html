<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        .container{
            background-color: lightpink;
            display: flex;
            flex-flow: row nowrap;
            justify-content:  -evenly;
            height: 500px;
            align-items: center;
        }

        .items{
            background-color: aliceblue;
            border: 1px solid black;
            padding: 50px;
            flex-basis: 300px;
            /*flex:auto; ele se adapta automatico ao tamanho do .container*/
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="items" id="I1">
            1
        </div>
        <div class="items" id="I2">
            2
        </div>
        <div class="items" id="I3">
            3
        </div>
        <div class="items" id="I4">
            4
        </div>
        <div class="items" id="I5">
            5
        </div>
    </div>
</body>
</html>
