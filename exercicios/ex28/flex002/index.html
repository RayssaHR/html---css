<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            font-family: 'Courier New', Courier, monospace;
        }

        body{

            background-color: bisque;
        }

        #container{
            width: 100vw;
            height: 100vh;
            background-color: antiquewhite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .items{
            background-color: blueviolet;
            width: 200px;
            height: 200px;

        }
    </style>
</head>
<body>
    <div id="container">
        <div class="items">
            <header>
                Login
            </header>
        </div>
    </div>
</body>
</html>
