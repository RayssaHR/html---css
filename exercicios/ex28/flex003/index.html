<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        .container{
            height: 500px;
            background-color: lightpink;
            display: flex;
            align-content: flex-start;
            flex-flow: row wrap;
            
        }

        .items{
            background-color: aliceblue;
            border: 1px solid black;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items">
            1
        </div>
        <div class="items">
            2
        </div>
        <div class="items">
            3
        </div>
        <div class="items">
            4
        </div>
        <div class="items">
            5
        </div>
    </div>
</body>
</html>
