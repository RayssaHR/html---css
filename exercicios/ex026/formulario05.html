<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="cadastro.php" method="get">
        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="ismasc">
            <label for="ismasc">Masculino</label> <br>

            <input type="radio" name="sexo" id="isfem">
            <label for="isfem">Feminino</label> <br>

            <input type="radio" name="sexo" id="isout">
            <label for="isout">Outro</label>
        </fieldset>

        <fieldset>
            <legend>Esportes favoritos</legend>

            <input type="checkbox" name="basquete" id="ibasquete">
            <label for="ibasquete">Basquete</label> <br>

            <input type="checkbox" name="futebol" id="ifutebol">
            <label for="ifutebol">Futebol</label> <br>

            <input type="checkbox" name="volei" id="ivolei">
            <label for="ivolei">Vôlei</label> <br>

            <input type="checkbox" name="tenis" id="itenis">
            <label for="itenis">Tênis</label> <br>

            <input type="checkbox" name="natacao" id="inatacao">
            <label for="inatacao">Natação</label> <br>

            <input type="checkbox" name="nenhum" id="inenhum">
            <label for="inenhum">Nenhum</label>

        </fieldset>
        
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
