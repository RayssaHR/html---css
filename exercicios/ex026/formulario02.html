<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
   <form action="casdastro.php" method="post" autocomplete="off">
    <p>
        <label for="iusu">Usuário: </label>
        <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" placeholder="nome do usuario">
    </p>
    <p>
        <label for="isenha">Senha: </label>
        <input type="password" name="sen" id="isenha" required minlength="8" >
    </p>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
   </form> 
</body>
</html>
