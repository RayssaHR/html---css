 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>'Formulário'</title>
 </head>
 <body>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Cadastro</legend>
            <p>
            <label for="inome">Nome</label>
            <input type="text" name="nome" id="inome" required placeholder="Nome Completo" autocomplete="name">
        </p>
        <p>
            <label for="iemail">E-mail</label>
            <input type="email" name="email" id="iemail" required placeholder="abc@x.com" autocomplete="email">
        </p>
        <p>
            <label for="icel">Celular</label>
            <input type="tel" name="cel" id="icel" pattern="\(\d{2}\)\d{4,5}-\d{4}" required placeholder="(00)00000-0000" autocomplete="tel-national" >
        </p>
        <p>
            <label for="isenha">Senha</label>
            <input type="password" name="senha" id="isenha" required minlength="8" maxlength="15">
        </p>
        </fieldset>
        

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
 </body>
 </html>
