<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafo</title>
</head>
<body>
    <h1>Parágrafo e quebra de linhas </h1>
    <hr>
    <p>
        Você pode escrever 
        um parágrafo de qualquer jeito. Basta colocar 
        tudo dentro do par de tags p e /p.
    </p>
    <p> 
        Se precisar quebrar p texto em algum lugar especifico <br> como esse, Você pode usar a tag br.
    </p>
    <p>
        Adicionar emoji: <!--para add emoji 
        adicione sem &#x e o codigo do emoji e ;-->
       <br> &#x2728;
       <br> &#x1F49F;
       <br> &#x2620;
    </p>
</body>
</html>
