<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Modelo de caixa</title>
    <style>   
   
        h1{
            background-color: lightpink;

            /*
            TAMANHO DA CAIXA
            */
            width: 500px;
            height: 300px;

            /*
            CORPO DA CAIXA
            */
            border-width: 3px;
            border-style: solid;
            border-right: 10px;
            border-top: 10px;
            border-color: darkgray;

           
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;

            outline-width: 3px;
            outline-style: dashed;
            outline-color: blueviolet;

        }

        a{
            border:5px;
            border-style: double;
            border-color: darkgray;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <h1>Modelo de caixa box-level </h1>
    <p>o paragrafo tambem é boxx-level mas o <a href="#">link é um inline-level</a></p>
    
</body>
</html>
