<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela grande</title>
    <style>
        table{
            width: 500px;
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,td {
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }

        thead, tfoot{
            background-color: lightgrey;
        }
    </style>
</head>
<body>
    <table>
         <thead>
        <tr>
            <th>Estado</th>
            <th>População</th>
        </tr>
     </thead>

     <tbody>
        <tr>
            <td>São Paulo</td>
            <td>46.081.801</td>
        </tr>
        <tr>
            <td>Minas Gerais</td>
            <td>21.168.791</td>
        </tr>
        <tr>
            <td>Rio de janeiro</td>
            <td>17.264.943</td>
        </tr>
     </tbody>

     <tfoot>
        <tr>
            <th>Total de habitantes</th>
            <td>000000000</td>
        </tr>
     </tfoot>
    </table>
    
</body>
</html>
