<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 01</title>
    <style>
        body{
            font-family: 'Courier New', Courier, monospace;  
        }

        table{
            width: 700px;
            text-align: center;
            border-collapse: collapse;
        }

        th, tr, td{
            border: 1px solid #463c80;
            padding: 16px;
            background-color: #ede3ffa4;
           
        }

        th{
            background-color: #c8c2e7;
        }

        .alinhar-esquerda{
            text-align: left;
        }
    </style>
</head>
<body>
   <table>
    <tr>
         <thead> 
            <tr>
                <th scope="row" rowspan="2">Área</th>
                <th scope="row" rowspan="2">Disciplina</th>
                <th scope="colgroup" colspan="2">Nota</th>
                <th scope="row" rowspan="2">Média</th>
                <tr>
                    <th scope="col">Nota 1</th>
                    <th scope="col">Nota 2</th>
                </tr>
            </tr>
        </thead>
    </tr>
    <tr>
         <tbody>
            <tr>
                <th scope="rowgroup" rowspan="5">Exatas</th>
            </tr>
            <tr>
                <td>Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
         </tbody>
    </tr>
    <tr>
        <thead>
            <tr>
                <th scope="row" class="alinhar-esquerda"  colspan="4">Média de Exatas</th>
                <th>0.0</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="5">Humanas</th>
            </tr>
            <tr>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
        </tbody>
        <thead>
            <tr>
                <th scope="row" class="alinhar-esquerda" colspan="4">Média de Humanas</th>
                <th>0.0</th>
            </tr>
        </thead>
    </tr>
        
   </table> 
</body>
</html>
